{{- /*
  Embeds an OpenAPI spec as a Swagger-style reference (Redoc).
  Usage: {{< redoc spec="/api-specs/commonvessel.json" >}}

  Redoc is rendered inside an <iframe> pointing at /redoc/ so the site theme's
  global CSS cannot leak into (and break) Redoc's own styling. The frame fills
  the viewport so Redoc's own single-scroll layout is used (no tiny inner box).

  The height lives in a static <style> block, NOT an inline style attribute:
  Hugo/Go's html/template sanitises calc() inside style="" to "ZgotmplZ".
*/ -}}
<style>
  .redoc-frame {
    width: 100%;
    height: calc(100vh - 140px);
    min-height: 640px;
    border: 0;
    display: block;
  }
</style>
<iframe
  class="redoc-frame"
  src="{{ "redoc/" | relURL }}?spec={{ .Get "spec" }}"
  title="API reference"
  loading="lazy"></iframe>
